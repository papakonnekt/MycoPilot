name: publish

# Publishes memory-bank-skill to PyPI on every pushed `v*` tag.
# Uses PyPI Trusted Publishing (OIDC) — no long-lived API token.
# Trusted Publisher config on pypi.org must match:
#   owner:       fockus
#   repo:        skill-memory-bank
#   workflow:    publish.yml
#   environment: pypi

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Verify version matches tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG="${TAG_NAME#v}"
          FILE_VERSION=$(cat VERSION)
          INIT_VERSION=$(python -c "from memory_bank_skill import __version__; print(__version__)")
          echo "Tag:  $TAG"
          echo "File: $FILE_VERSION"
          echo "Init: $INIT_VERSION"
          if [ "$TAG" != "$FILE_VERSION" ] || [ "$TAG" != "$INIT_VERSION" ]; then
            echo "::error::Version mismatch between tag, VERSION file, and __init__.py"
            exit 1
          fi

      - name: Build
        run: python -m build

      - name: List distributions
        run: ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/memory-bank-skill/
    permissions:
      id-token: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish (Trusted Publisher OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog for this tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          awk -v v="$VERSION" '
            BEGIN { inside=0 }
            $0 ~ "^## \\["v"\\]" { inside=1; next }
            inside && /^## \[/ { exit }
            inside { print }
          ' CHANGELOG.md > .release-notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes-file ".release-notes.md" \
            dist/*
