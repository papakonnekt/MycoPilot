name: Build Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Client Dependencies
        run: npm ci
        working-directory: client

      - name: Build Client Web Assets
        run: npm run build
        working-directory: client
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

      - name: Sync Web Assets to Android
        run: npx cap sync android
        working-directory: client

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew
        working-directory: client/android

      - name: Compile Debug APK
        run: ./gradlew assembleDebug
        working-directory: client/android

      - name: Rename Output APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/MycoScheduler.apk
        working-directory: client/android

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: client/android/app/build/outputs/apk/debug/MycoScheduler.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
